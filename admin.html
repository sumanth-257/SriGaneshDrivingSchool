<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal  Sri Ganesh Driving School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <!-- Updated Font Link: Inter & Space Grotesk -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    /* Added Inter and Space Grotesk to :root comment for clarity */
    :root{--amber:#ffb700;--crimson:#e63946;--purple:#9b5de5;--bg:#060a10;--bg2:#0b1120;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#6b7a99;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    /* Changed Body Font: Outfit -> Inter */
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;background:rgba(6,10,16,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;}
    /* Changed Nav Logo Font: Syne -> Space Grotesk */
    .nav-logo{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;color:white;display:flex;align-items:center;gap:10px;} /* Updated Font */
    .nav-dot{width:8px;height:8px;background:var(--purple);border-radius:50%;box-shadow:0 0 12px var(--purple);animation:pd 2s infinite;flex-shrink:0;}
    @keyframes pd{0%,100%{transform:scale(1)}50%{transform:scale(1.5);opacity:0.6}}
    .back-link{font-size:.875rem;color:var(--muted);text-decoration:none;transition:color .2s;min-height:44px;display:flex;align-items:center;}
    .back-link:hover{color:var(--amber);}

    /* HERO */
    .hero{position:relative;min-height:24vh;display:flex;align-items:center;justify-content:center;overflow:hidden;text-align:center;padding:70px 20px 30px;}
    .hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(155,93,229,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(155,93,229,0.04) 1px,transparent 1px);background-size:60px 60px;}
    .hero-glow{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 60%,rgba(155,93,229,0.1) 0%,transparent 70%);}
    .hero-content{position:relative;z-index:2;animation:fsu .8s both;}
    .hero-pill{display:inline-flex;align-items:center;gap:8px;padding:7px 18px;background:rgba(155,93,229,0.08);border:1px solid rgba(155,93,229,0.2);border-radius:100px;font-size:2rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#c084fc;margin-bottom:14px;}
    .hero-pill-d{width:5px;height:5px;background:#c084fc;border-radius:50%;animation:pd 1.5s infinite;flex-shrink:0;}
    /* Changed Hero Title Font: Syne -> Space Grotesk */
    .hero h1{font-family:'Space Grotesk',sans-serif;font-weight:700;color:white;margin-bottom:8px;} /* Updated Font */
    .hero h1 em{display:block;background:linear-gradient(135deg,#9b5de5,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:normal;}
    .hero p{color:var(--muted);font-size:1rem;}
    @keyframes fsu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    /* LOGIN CARD */
    .login-wrap{max-width:440px;margin:-18px auto 50px;padding:0 16px;position:relative;z-index:10;}
    .card{border-radius:20px;overflow:hidden;border:1px solid var(--border);background:var(--bg2);box-shadow:0 24px 60px rgba(0,0,0,0.5);}
    .card-head{padding:22px 24px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;}
    .card-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--purple),transparent);}
    .card-head-ico{width:46px;height:46px;border-radius:14px;background:rgba(155,93,229,0.1);border:1px solid rgba(155,93,229,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    /* Changed Card Headings Font: Syne -> Space Grotesk */
    .card-head h2{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700;color:white;} /* Updated Font */
    .card-head p{color:var(--muted);font-size:.85rem;margin-top:3px;}
    .card-body{padding:22px 24px;}
    .field{margin-bottom:18px;position:relative;}
    .field label{display:block;font-size:.8rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;transition:color .2s;}
    .field:focus-within label{color:#c084fc;}
    .field-wrap{position:relative;}
    .field-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;display:flex;align-items:center;}
    /* Kept Outfit for inputs to maintain consistency with the form style */
    .field input{width:100%;padding:15px 16px 15px 44px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:14px;font-family:'Inter',sans-serif;font-size:1rem;font-weight:500;color:var(--text);transition:all .3s;min-height:52px;} /* Updated Font */
    .field input:focus{outline:none;border-color:rgba(155,93,229,0.5);background:rgba(155,93,229,0.05);box-shadow:0 0 0 3px rgba(155,93,229,0.1);}
    .field input::placeholder{color:rgba(107,122,153,0.7);}

    /* BUTTONS */
    .btn{position:relative;padding:15px 24px;border:none;border-radius:14px;font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.3px;cursor:pointer;overflow:hidden;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;display:inline-flex;align-items:center;gap:8px;text-decoration:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:50px;} /* Updated Font */
    .btn:active{transform:scale(.97);}
    .btn .shimmer{position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);transform:skewX(-20deg);transition:left .55s;}
    .btn:hover .shimmer{left:160%;}
    .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.25);transform:scale(0);animation:rpl .6s linear;pointer-events:none;}
    @keyframes rpl{to{transform:scale(4.5);opacity:0}}
    .btn-full{width:100%;justify-content:center;}
    .btn-purple{background:linear-gradient(135deg,#9b5de5,#6a0dad);color:white;box-shadow:0 10px 32px rgba(155,93,229,0.4),inset 0 1px 0 rgba(255,255,255,.15);}
    .btn-ghost{background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(255,255,255,.1);}
    .btn-approve{background:linear-gradient(135deg,#00c896,#00a87a);color:#060a10;box-shadow:0 6px 20px rgba(0,200,150,.3),inset 0 1px 0 rgba(255,255,255,.2);padding:10px 16px;font-size:.875rem;border-radius:10px;min-height:40px;}
    .btn-approve:active{transform:scale(.97);}
    .btn-deny{background:linear-gradient(135deg,#e63946,#c0392b);color:white;box-shadow:0 6px 20px rgba(230,57,70,.3),inset 0 1px 0 rgba(255,255,255,.15);padding:10px 16px;font-size:.875rem;border-radius:10px;min-height:40px;}
    .btn-deny:active{transform:scale(.97);}
    .btn-logout{background:rgba(230,57,70,.1);color:#ff8a92;border:1px solid rgba(230,57,70,.2);font-size:.875rem;}

    .login-err{text-align:center;font-size:.9rem;font-weight:600;color:#ff8a92;min-height:20px;margin-top:12px;}

    /* CONTENT */
    .content-wrap{max-width:1100px;margin:-18px auto 50px;padding:0 16px;display:none;position:relative;z-index:10;}
    .content-card{border-radius:20px;overflow:hidden;border:1px solid var(--border);background:var(--bg2);box-shadow:0 24px 60px rgba(0,0,0,.5);}

    /* TABS */
    .tabs{display:flex;align-items:stretch;border-bottom:1px solid var(--border);background:rgba(0,0,0,.3);overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    /* Changed Tab Labels Font: Outfit -> Inter */
    .tab{padding:16px 18px;background:transparent;border:none;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;position:relative;display:flex;align-items:center;gap:6px;min-height:52px;-webkit-tap-highlight-color:transparent;} /* Updated Font */
    .tab::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--purple);transform:scaleX(0);transition:transform .2s;}
    .tab:hover{color:var(--text);}
    .tab.active{color:var(--purple);}
    .tab.active::after{transform:scaleX(1);box-shadow:0 0 10px rgba(155,93,229,.4);}
    .tabs-right{margin-left:auto;}

    /* TABLE AREA */
    .tarea{padding:24px;}
    /* Changed Table Title Font: Syne -> Space Grotesk */
    .t-title{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;color:white;margin-bottom:18px;} /* Updated Font */
    .t-shell{border-radius:14px;overflow:hidden;border:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
    table{width:100%;border-collapse:collapse;min-width:500px;}
    thead th{padding:14px 16px;font-size:.8rem;letter-spacing:1.5px;text-transform:uppercase;background:rgba(155,93,229,.07);color:#c084fc;text-align:center;border-bottom:1px solid var(--border);font-weight:700;white-space:nowrap;}
    tbody td{padding:13px 16px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04);font-size:.9rem;font-weight:500;color:var(--text);}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr{background:var(--surface);transition:background .2s;}
    tbody tr:hover{background:rgba(155,93,229,.04);}
    .empty{text-align:center;padding:50px;color:var(--muted);font-size:.95rem;font-weight:600;}
    .act-wrap{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

    /* MINI PROGRESS CHART */
    .mini-chart{display:flex;align-items:center;gap:8px;justify-content:center;}
    .mini-bar-track{width:72px;height:6px;background:rgba(255,255,255,0.1);border-radius:100px;overflow:hidden;flex-shrink:0;}
    .mini-bar-fill{height:100%;border-radius:100px;transition:width .6s;}
    .mini-pct{font-size:.8rem;font-weight:700;min-width:34px;text-align:left;}

    /* FOOTER */
    footer{padding:10px 20px;text-align:center;border-top:1px solid var(--border);}
    /* Changed Footer Brand Font: Syne -> Space Grotesk */
    .f-brand{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;color:white;margin-bottom:6px;} /* Updated Font */
    .f-brand span{color:var(--amber);}
    footer p{color:var(--muted);font-size:.85rem;}

    /* RESPONSIVE */
    @media(max-width:768px){
      .tarea{padding:16px 12px;}
      .content-wrap{padding:0 10px;}
    }
    @media(max-width:600px){
      .hero{padding:60px 16px 24px;min-height:auto;}
      .hero h1{font-size:clamp(1.8rem,9vw,2.6rem);} /* Adjusted for new font if needed, but clamp usually handles it */
      .login-wrap{padding:0 12px;}
      .tab{padding:14px 12px;font-size:.75rem;letter-spacing:.5px;}
      .t-title{font-size:1.1rem;} /* Adjusted for new font */
    }
    @media(max-width:390px){
      nav{padding:0 14px;height:56px;}
      .nav-logo{font-size:.88rem;}
      .card-head{padding:16px 14px;}
      .card-body{padding:16px 14px;}
      .field input{font-size:.95rem;}
      .field label{font-size:.75rem;}
      .tab{padding:12px 10px;font-size:.7rem;}
      .btn-approve,.btn-deny{font-size:.8rem;padding:9px 12px;}
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo"><div class="nav-dot"></div>Sri Ganesh Driving</div>
    <a href="index.html" class="back-link">Home</a>
  </nav>

  <div class="hero">
    <div class="hero-grid"></div>
    <div class="hero-glow"></div>
    <div class="hero-content">
      <div class="hero-pill">Restricted Access</div>
      <p>Manage approvals &amp; student records</p>
    </div>
  </div>

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="card">
      <div class="card-head">
        <div class="card-head-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9b5de5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        <div><h2>Admin Login</h2><p>Enter password to access the portal</p></div>
      </div>
      <div class="card-body">
        <form id="loginForm">
          <div class="field">
            <label for="ap">Admin Password</label>
            <div class="field-wrap">
              <span class="field-ico" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);display:flex;align-items:center;pointer-events:none;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b7a99" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
              <input type="password" id="ap" placeholder="Enter your admin password" required/>
            </div>
          </div>
          <button type="submit" class="btn btn-purple btn-full"><span class="shimmer"></span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:6px;"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Login to Portal</button>
          <p class="login-err" id="loginErr"></p>
        </form>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content-wrap" id="contentWrap">
    <div class="content-card">
      <div class="tabs">
        <button class="tab active" onclick="loadPendingAtt(this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:6px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Pending Attendance</button>
        <button class="tab" onclick="loadPendingStudents(this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:6px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Pending Students</button>
        <button class="tab" onclick="loadStudents(this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:6px;"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>All Students</button>
        <button class="tab tabs-right btn-logout" onclick="doLogout()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:6px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</button>
      </div>
      <div class="tarea">
        <div id="tc"></div>
      </div>
    </div>
  </div>

  <footer>
    <div class="f-brand"><span>Sri Ganesh</span> Driving School</div>
    <p>© 2025 Sri Ganesh Driving School, Vizianagaram · Excellence Since 2000</p>
  </footer>

  <script>
    const SURL="https://script.google.com/macros/s/AKfycbw1WQvVlbjDF7Vnv0tAmB6BuebSG-g6WeKOMcPC8sWlOnAD874h_SLkkQRdSiwZBb5C/exec";
    let ap="";

    // Ripple helper
    function addRipple(btn){btn.addEventListener('click',e=>{
      const r=document.createElement('span');
      r.className='ripple';
      const rc=btn.getBoundingClientRect(), sz=Math.max(rc.width,rc.height);
      r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rc.left-sz/2}px;top:${e.clientY-rc.top-sz/2}px;`;
      btn.appendChild(r);
      setTimeout(()=>r.remove(),700);
    });}
    document.querySelectorAll('.btn').forEach(addRipple);

    document.getElementById('loginForm').addEventListener('submit',e=>{
      e.preventDefault();
      ap=document.getElementById('ap').value.trim();
      if(!ap){document.getElementById('loginErr').textContent='⚠️ Enter password!';return;}
      document.getElementById('loginWrap').style.display='none';
      document.getElementById('contentWrap').style.display='block';
      loadPendingAtt(document.querySelector('.tab.active')); // Load the active tab's content initially
    });

    function doLogout(){
      ap='';
      document.getElementById('contentWrap').style.display='none';
      document.getElementById('loginWrap').style.display='block';
      document.getElementById('ap').value='';
      document.getElementById('loginErr').textContent='';
    }

    function setTab(el){
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      if(el) el.classList.add('active');
    }

    function loading(){
      document.getElementById('tc').innerHTML=`<p style='padding:40px;color:var(--muted);text-align:center;font-size:.9rem;'>⏳ Loading…</p>`;
    }

    async function loadPendingAtt(el){
      setTab(el);
      loading();
      try{
        const d=await(await fetch(`${SURL}?action=pending&password=${encodeURIComponent(ap)}`)).json();
        if(d.status!=='OK'){alert('Invalid password');doLogout();return;}
        let h=`<div class="t-title">Pending Attendance Approvals</div><div class="t-shell"><table><thead><tr><th>Date</th><th>Phone</th><th>Name</th><th>Course</th><th>Timing</th><th>Actions</th></tr></thead><tbody>`;
        if(!d.records?.length) h+=`<tr><td colspan="6" class="empty">✓ No pending records</td></tr>`;
        else d.records.forEach(r=>{
          h+=`<tr><td>${r.date}</td><td>${r.phone}</td><td><strong style="color:white">${r.name}</strong></td><td>${r.course}</td><td>${r.timing}</td><td><div class="act-wrap"><button class="btn btn-approve" onclick="approve('${r.phone}','${r.date}')"><span class="shimmer"></span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;"><polyline points="20 6 9 17 4 12"/></svg> Approve</button><button class="btn btn-deny" onclick="deny('${r.phone}','${r.date}')"><span class="shimmer"></span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Deny</button></div></td></tr>`;
        });
        document.getElementById('tc').innerHTML=h+`</tbody></table></div>`;
        document.querySelectorAll('.btn').forEach(addRipple);
      }catch{
        document.getElementById('tc').innerHTML=`<p style='padding:40px;color:#ff8a92;text-align:center;'>⚠️ Network error</p>`;
      }
    }

    async function loadPendingStudents(el){
      setTab(el);
      loading();
      try{
        const d=await(await fetch(`${SURL}?action=pendingStudents&password=${encodeURIComponent(ap)}`)).json();
        if(d.status!=='OK'){alert('Invalid password');doLogout();return;}
        let h=`<div class="t-title">Pending Student Enrollments</div><div class="t-shell"><table><thead><tr><th>Date</th><th>Phone</th><th>Name</th><th>Course</th><th>Max Classes</th><th>Actions</th></tr></thead><tbody>`;
        if(!d.records?.length) h+=`<tr><td colspan="6" class="empty">✓ No pending enrollments</td></tr>`;
        else d.records.forEach(r=>{
          h+=`<tr><td>${r.date}</td><td>${r.phone}</td><td><strong style="color:white">${r.name}</strong></td><td>${r.course}</td><td>${r.maxClasses}</td><td><div class="act-wrap"><button class="btn btn-approve" onclick="approveS('${r.phone}')"><span class="shimmer"></span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;"><polyline points="20 6 9 17 4 12"/></svg> Approve</button><button class="btn btn-deny" onclick="denyS('${r.phone}')"><span class="shimmer"></span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Deny</button></div></td></tr>`;
        });
        document.getElementById('tc').innerHTML=h+`</tbody></table></div>`;
        document.querySelectorAll('.btn').forEach(addRipple);
      }catch{
        document.getElementById('tc').innerHTML=`<p style='padding:40px;color:#ff8a92;text-align:center;'>⚠️ Network error</p>`;
      }
    }

    async function loadStudents(el){
      setTab(el);
      loading();
      try{
        const d=await(await fetch(`${SURL}?action=viewStudents&password=${encodeURIComponent(ap)}`)).json();
        if(d.status!=='OK'){alert('Unauthorized');doLogout();return;}
        let h=`<div class="t-title">Registered Students</div><div class="t-shell"><table><thead><tr><th>Phone</th><th>Name</th><th>Course</th><th>Progress</th><th>Classes Taken</th><th>Max Classes</th></tr></thead><tbody>`;
        if(!d.records?.length) h+=`<tr><td colspan="6" class="empty">No registered students yet</td></tr>`;
        else d.records.forEach(r=>{
          const taken=parseInt(r.classesTaken)||0;
          const max=parseInt(r.maxClasses)||1;
          const pct=Math.min(100,Math.round((taken/max)*100));
          const clr=pct>=80?'#00c896':pct>=40?'#ffb700':'#00b4d8';
          h+=`<tr>
            <td>${r.phone}</td>
            <td><strong style="color:white">${r.name}</strong></td>
            <td><span style="font-size:.75rem;padding:3px 10px;border-radius:100px;background:rgba(155,93,229,.15);color:#c084fc;font-weight:700;">${r.course}</span></td>
            <td>
              <div class="mini-chart">
                <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%;background:${clr};box-shadow:0 0 6px ${clr}66;"></div></div>
                <span class="mini-pct" style="color:${clr}">${pct}%</span>
              </div>
            </td>
            <td><strong style="color:${clr}">${taken}</strong></td>
            <td>${max}</td>
          </tr>`;
        });
        document.getElementById('tc').innerHTML=h+`</tbody></table></div>`;
      }catch{
        document.getElementById('tc').innerHTML=`<p style='padding:40px;color:#ff8a92;text-align:center;'>⚠️ Network error</p>`;
      }
    }

    async function approve(ph,dt){
      try{
        await fetch(SURL,{method:'POST',body:new URLSearchParams({action:'approve',phone:ph,date:dt})});
      }catch{}
      loadPendingAtt(null); // Reload the current tab
    }
    async function deny(ph,dt){
      try{
        await fetch(SURL,{method:'POST',body:new URLSearchParams({action:'deny',phone:ph,date:dt})});
      }catch{}

    }

    }
  </script>
